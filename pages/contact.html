<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — RecrutPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css" />
  <style>
    .contact-section { padding: 90px 48px; max-width: 620px; margin: 0 auto; }
    .contact-section h1 { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:#042C53; margin-bottom:10px; }
    .contact-section .subtitle { margin-bottom:40px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px; }
    .form-group input,
    .form-group textarea {
      width:100%; padding:12px 16px; border:1px solid #e5e7eb;
      border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px;
      color:#1a1a2e; outline:none; transition:border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color:#185FA5; box-shadow:0 0 0 3px rgba(24,95,165,0.1); }
    .form-group textarea { height:140px; resize:vertical; }
    .submit-btn {
      background:#185FA5; color:#fff; padding:14px 32px; border:none;
      border-radius:10px; font-size:15px; font-weight:500;
      font-family:'DM Sans',sans-serif; cursor:pointer;
      transition:background 0.2s, transform 0.15s; width:100%;
    }
    .submit-btn:hover { background:#042C53; transform:translateY(-1px); }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="logo-wrapper">
      <img src="../images/logo.png" alt="Logo RecrutPro" class="logo-img" onerror="this.style.display='none'" />
      <a href="../index.html" style="text-decoration:none;">
        <span class="logo">Recrut<span class="logo-accent">Pro</span></span>
      </a>
    </div>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html#services">Services</a></li>
      <li><a href="../index.html#temoignages">Témoignages</a></li>
      <li><a href="../index.html#about">À propos</a></li>
      <li><a href="#" class="btn-contact">Contact</a></li>
    </ul>
    <button class="burger" id="burger"><span></span><span></span><span></span></button>
  </nav>

  <section class="contact-section">
    <p class="tag animate">Parlons de votre projet</p>
    <h1 class="animate delay-1">Contactez-nous</h1>
    <p class="subtitle animate delay-2">Un expert vous répond sous 24h pour discuter de vos besoins en recrutement.</p>

    <form id="contact-form" class="animate delay-3" name="contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="contact" />
      <div class="form-group">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" placeholder="ex: Amadou Mbaye" />
      </div>
      <div class="form-group">
        <label for="email">Email professionnel</label>
        <input type="email" id="email" placeholder="ex: amadou@entreprise.sn" />
      </div>
      <div class="form-group">
        <label for="entreprise">Entreprise</label>
        <input type="text" id="entreprise" placeholder="Nom de votre entreprise" />
      </div>
      <div class="form-group">
        <label for="message">Votre besoin</label>
        <textarea id="message" placeholder="Décrivez votre besoin en recrutement..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Envoyer le message →</button>
    </form>
  </section>

  <footer>
    <div class="footer-content">
      <div class="logo-wrapper">
        <img src="../images/logo-blanc.png" alt="Logo" class="logo-img footer-logo-img" onerror="this.style.display='none'" />
        <span class="logo footer-logo">Recrut<span class="logo-accent">Pro</span></span>
      </div>
      <p class="footer-copy">© 2025 RecrutPro — Dakar, Sénégal</p>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
